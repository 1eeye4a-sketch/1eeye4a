<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="이예다 옷장 — SCENE 03 · DRESS ROOM">
  <title>LEE YEDA — Dress Room</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/le/leeyeda/leeyeda.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/cinema.css">
  <style>
    /* ── 옷장 전용 ── */
    .dr-hero{position:relative;margin:0 0 26px;height:clamp(200px,30vh,340px);border:1px solid var(--line);overflow:hidden}
    .dr-hero img{width:100%;height:100%;object-fit:cover;object-position:center 28%;filter:saturate(.9) contrast(1.03)}
    .dr-hero .wash{position:absolute;inset:0;background:linear-gradient(90deg,rgba(72,12,31,.55),transparent 45%),linear-gradient(0deg,rgba(52,8,22,.55),transparent 42%)}
    body.day .dr-hero .wash{background:linear-gradient(90deg,rgba(255,241,238,.5),transparent 45%),linear-gradient(0deg,rgba(255,238,234,.5),transparent 42%)}
    .dr-hero .cap{position:absolute;left:26px;bottom:18px}
    .dr-hero .cap .k{display:block;color:#ffd9d9;font-family:var(--font-serif);font-style:italic;font-size:11px;letter-spacing:.14em;margin-bottom:6px}
    body.day .dr-hero .cap .k{color:var(--point)}
    .dr-hero .cap b{color:#fff;font-family:var(--font-serif);font-weight:400;font-size:clamp(18px,2vw,26px);letter-spacing:-.02em;text-shadow:0 3px 18px rgba(53,6,22,.5)}
    body.day .dr-hero .cap b{color:#4a1224;text-shadow:none}

    /* 모드 토글 + 분류 탭 */
    .dr-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;margin:0 0 20px}
    .mode-seg{display:inline-flex;border:1px solid var(--line)}
    .seg-btn{
      padding:11px 20px;border:0;background:transparent;color:var(--tx-dim);cursor:pointer;
      font-size:10px;font-weight:900;letter-spacing:.14em;transition:background 160ms ease,color 160ms ease;
    }
    .seg-btn + .seg-btn{border-left:1px solid var(--line)}
    .seg-btn.active{background:var(--point);color:#fff}
    .cat-tabs{display:inline-flex;gap:22px}
    .cat-tabs button{
      position:relative;padding:10px 0;border:0;background:none;color:var(--tx-dim);cursor:pointer;
      font-size:11px;font-weight:750;letter-spacing:.1em;
    }
    .cat-tabs button i{margin-right:6px;color:var(--tx-dim);font-family:var(--font-serif);font-style:italic;font-size:9px}
    .cat-tabs button::after{content:"";position:absolute;right:100%;bottom:4px;left:0;height:1px;background:var(--white);transition:right 180ms ease}
    .cat-tabs button.on{color:var(--tx)}
    .cat-tabs button.on::after{right:0}
    .cat-tabs button.on i{color:var(--main)}
    body.day .cat-tabs button.on i{color:var(--point)}

    /* 포스터 그리드 */
    .poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .poster{
      position:relative;border:1px solid var(--line);background:var(--glass);
      aspect-ratio:3/4;overflow:hidden;cursor:pointer;
    }
    .poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 400ms cubic-bezier(.2,.75,.25,1)}
    .poster:hover img{transform:scale(1.03)}
    .poster .grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(52,8,22,.78),transparent 46%)}
    .poster .new{
      position:absolute;top:12px;left:12px;padding:5px 10px;
      background:var(--point);color:#fff;font-size:9px;font-weight:900;letter-spacing:.16em;
    }
    .poster .meta{position:absolute;right:14px;bottom:12px;left:14px;color:#fff}
    .poster .meta .c{display:block;font-family:var(--font-serif);font-style:italic;font-size:10px;letter-spacing:.12em;color:#ffd9d9;margin-bottom:4px}
    .poster .meta b{font-family:var(--font-serif);font-weight:400;font-size:19px;letter-spacing:-.02em;line-height:1.3}
    .poster .meta .d{display:block;margin-top:5px;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.62)}
    .poster .noimg{position:absolute;inset:0;display:grid;place-items:center;color:var(--tx-dim);font-family:var(--font-serif);font-style:italic;font-size:14px}

    /* 아카이브 그리드 */
    .arch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .arch{position:relative;border:1px solid var(--line-soft);background:var(--glass);cursor:pointer;overflow:hidden}
    .arch .im{aspect-ratio:3/4;overflow:hidden;background:rgba(255,255,255,.04)}
    .arch .im img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 400ms ease}
    .arch:hover .im img{transform:scale(1.04)}
    .arch .nm{padding:10px 12px;border-top:1px solid var(--line-soft)}
    .arch .nm b{display:block;font-size:12.5px;font-weight:700;line-height:1.4}
    .arch .nm span{display:block;margin-top:2px;color:var(--tx-dim);font-family:var(--font-serif);font-style:italic;font-size:10px;letter-spacing:.08em}
    .arch .im .noimg{width:100%;height:100%;display:grid;place-items:center;color:var(--tx-dim);font-family:var(--font-serif);font-style:italic;font-size:12px}

    /* 페이지네이션 */
    .dr-pager{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:26px}
    .dr-pager button{
      min-width:34px;height:34px;border:1px solid var(--line-soft);background:transparent;color:var(--tx-dim);
      cursor:pointer;font-family:var(--font-serif);font-style:italic;font-size:12px;
    }
    .dr-pager button.on{border-color:var(--line);color:var(--tx);background:rgba(255,177,177,.12)}
    .dr-pager button:disabled{opacity:.35;cursor:default}

    /* 라이트박스 */
    #drView{
      position:fixed;inset:0;z-index:85;display:none;place-items:center;padding:5vh 5vw;
      background:rgba(30,4,14,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    #drView.on{display:grid}
    #drView .box{position:relative;max-width:min(92vw,560px);max-height:90vh;border:1px solid var(--line);background:var(--glass-deep);display:grid;grid-template-rows:1fr auto}
    #drView .box img{width:100%;max-height:66vh;object-fit:contain;display:block;background:rgba(0,0,0,.2)}
    #drView .info{padding:18px 22px;border-top:1px solid var(--line-soft)}
    #drView .info .c{color:var(--main);font-family:var(--font-serif);font-style:italic;font-size:10px;letter-spacing:.14em}
    body.day #drView .info .c{color:var(--point)}
    #drView .info b{display:block;margin:5px 0 4px;font-family:var(--font-serif);font-weight:400;font-size:22px}
    #drView .info p{margin:0;color:var(--tx-soft);font-size:13px;line-height:1.7}
    #drView .x{
      position:absolute;top:-14px;right:-14px;width:34px;height:34px;border-radius:50%;
      border:1px solid var(--line);background:var(--point);color:#fff;cursor:pointer;font-size:14px;line-height:1;
    }

    @media (max-width:1000px){.poster-grid{grid-template-columns:repeat(2,1fr)}.arch-grid{grid-template-columns:repeat(3,1fr)}}
    @media (max-width:620px){
      .poster-grid{grid-template-columns:1fr}
      .arch-grid{grid-template-columns:repeat(2,1fr)}
      .dr-bar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script src="../js/cinema.js"></script>
  <script>
  (function(){
    /* ── 분류 (admin select + admin DRESS_CATS와 같은 값 유지 — 세 곳 동기화) ── */
    var CATS = [
      { key:'hair',   label:'헤어' },
      { key:'outfit', label:'의상' },
      { key:'lens',   label:'렌즈' }
    ];
    var LABELS = {}; CATS.forEach(function(c){ LABELS[c.key]=c.label; });
    var esc=CN.esc, txt=CN.txt;

    var items=[], curMode='new', curCat=CATS[0].key, curPage=1;
    var PER = { new:6, old:12 };

    function isNew(it){ 
      var b=it.badges;
      if(typeof b==='string'){ try{ b=JSON.parse(b); }catch(e){ b=[]; } }
      return (Array.isArray(b)?b:[]).some(function(x){ return x && String(x.label||x).toUpperCase()==='NEW'; });
    }
    function byOrder(a,b){
      var sa=a.sort_order==null?0:+a.sort_order, sb=b.sort_order==null?0:+b.sort_order;
      if(sa!==sb) return sa-sb;
      return String(b.created_at||'').localeCompare(String(a.created_at||''));
    }
    function fmtDate(iso){ var s=String(iso||'').slice(0,10); return s?s.replace(/-/g,'.'):''; }

    function renderTabs(){
      var el=document.getElementById('cat-tabs');
      el.innerHTML=CATS.map(function(c,i){
        return '<button type="button" data-cat="'+c.key+'" class="'+(c.key===curCat?'on':'')+'">'+
               '<i>0'+(i+1)+'</i>'+esc(c.label)+'</button>';
      }).join('');
      el.querySelectorAll('button').forEach(function(b){
        b.addEventListener('click',function(){ curCat=b.dataset.cat; curPage=1; renderTabs(); renderList(); });
      });
    }
    document.querySelectorAll('#mode-seg .seg-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        curMode=btn.dataset.mode; curPage=1;
        document.querySelectorAll('#mode-seg .seg-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.mode===curMode); });
        renderList();
      });
    });

    function pool(){
      return items.filter(function(it){
        if(it.category!==curCat) return false;
        return curMode==='new' ? isNew(it) : !isNew(it);
      }).sort(byOrder);
    }
    function renderPager(total){
      var el=document.getElementById('dr-pager');
      var pages=Math.max(1,Math.ceil(total/PER[curMode]));
      if(pages<=1){ el.innerHTML=''; return; }
      var h='';
      for(var i=1;i<=pages;i++) h+='<button type="button" data-p="'+i+'" class="'+(i===curPage?'on':'')+'">'+i+'</button>';
      el.innerHTML=h;
      el.querySelectorAll('button').forEach(function(b){
        b.addEventListener('click',function(){ curPage=+b.dataset.p; renderList(); window.scrollTo({top:0,behavior:'smooth'}); });
      });
    }
    function imgTag(it,cls){
      var u=txt(it.image_url).trim();
      if(!u) return '<div class="noimg">no photo yet</div>';
      return '<img src="'+esc(u)+'" alt="'+esc(it.name)+'" referrerpolicy="no-referrer" loading="lazy" '+
             'onerror="this.outerHTML=\'<div class=&quot;noimg&quot;>photo unavailable</div>\'">';
    }
    function renderList(){
      var el=document.getElementById('dr-list');
      var all=pool(), total=all.length;
      var start=(curPage-1)*PER[curMode], page=all.slice(start,start+PER[curMode]);
      if(!total){
        el.innerHTML = curMode==='new'
          ? '<div class="cn-empty">'+esc(LABELS[curCat]||'')+' 새 드레스가 아직 걸려 있지 않아요<br><span style="font-size:11.5px;opacity:.8;font-style:normal">admin에서 "✦ 새 옷으로 올리기"를 체크하면 여기 포스터로 떠요</span></div>'
          : '<div class="cn-empty">'+esc(LABELS[curCat]||'')+' 아카이브가 아직 비어 있어요</div>';
        renderPager(0); return;
      }
      if(curMode==='new'){
        el.innerHTML='<div class="poster-grid">'+page.map(function(it,i){
          return '<div class="poster" data-i="'+(start+i)+'">'+imgTag(it)+
            '<div class="grad"></div>'+
            (isNew(it)?'<span class="new">NEW ♥</span>':'')+
            '<div class="meta"><span class="c">'+esc(LABELS[it.category]||'')+'</span>'+
            '<b>'+esc(it.name)+'</b>'+
            '<span class="d">'+esc(fmtDate(it.created_at))+'</span></div></div>';
        }).join('')+'</div>';
      }else{
        el.innerHTML='<div class="arch-grid">'+page.map(function(it,i){
          return '<div class="arch" data-i="'+(start+i)+'"><div class="im">'+imgTag(it)+'</div>'+
            '<div class="nm"><b>'+esc(it.name)+'</b><span>'+esc(LABELS[it.category]||'')+'</span></div></div>';
        }).join('')+'</div>';
      }
      el.querySelectorAll('[data-i]').forEach(function(card){
        card.addEventListener('click',function(){ openView(all[+card.dataset.i]); });
      });
      renderPager(total);
    }

    /* 라이트박스 */
    var view=document.getElementById('drView');
    function openView(it){
      if(!it) return;
      var im=document.getElementById('drImg'), u=txt(it.image_url).trim();
      im.src=u||''; im.style.display=u?'block':'none';
      document.getElementById('drCat').textContent=(LABELS[it.category]||'')+' · '+fmtDate(it.created_at);
      document.getElementById('drName').textContent=txt(it.name);
      document.getElementById('drDesc').textContent=txt(it.description);
      view.classList.add('on');
    }
    document.getElementById('drX').addEventListener('click',function(){ view.classList.remove('on'); });
    view.addEventListener('click',function(e){ if(e.target===view) view.classList.remove('on'); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') view.classList.remove('on'); });

    async function load(){
      try{
        var res=await db.from('dress_items').select('*');
        if(res && Array.isArray(res.data)) items=res.data;
      }catch(e){}
      finally{ renderTabs(); renderList(); CN.ready(); CN.reveal(); }
    }
    renderTabs(); renderList();
    load();
  })();
  </script>
</body>
