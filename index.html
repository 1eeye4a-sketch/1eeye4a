<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <meta property="og:title" content="LEE YEDA">
  <meta property="og:description" content="아이돌을 꿈꾸는 당신의 옆집 유부녀 예다 🍑">

  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/le/leeyeda/leeyeda.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cinema.css">
  <style>
    /* ── 메인(웨딩 시네마) 전용 — 컨펌 시안 1:1 ── */
    body{overflow:hidden}
    .page-shell,.wedding-cinema{position:relative;width:100%;min-width:320px;height:100vh;min-height:560px;overflow:hidden}
    @supports (height:100svh){.page-shell,.wedding-cinema{height:100svh}}
    .wedding-cinema{isolation:isolate;background:var(--wine);animation:page-in 560ms cubic-bezier(.2,.75,.25,1) both}
    @keyframes page-in{from{opacity:0;transform:scale(1.012)}to{opacity:1;transform:scale(1)}}
    .hero-background,.color-wash{position:absolute;inset:0;width:100%;height:100%}
    .hero-background{z-index:-4;object-fit:cover;object-position:center center;filter:saturate(.88) contrast(1.04);transform:scale(1.015)}
    .color-wash{z-index:-3;background:
      linear-gradient(90deg,rgba(72,12,31,.94) 0%,rgba(91,16,39,.78) 24%,rgba(91,16,39,.12) 56%,rgba(59,9,25,.2) 100%),
      linear-gradient(0deg,rgba(52,8,22,.65) 0%,transparent 36%)}
    body.day .color-wash{background:
      linear-gradient(90deg,rgba(255,241,238,.92) 0%,rgba(255,236,233,.72) 24%,rgba(255,236,233,.08) 56%,rgba(255,228,224,.18) 100%),
      linear-gradient(0deg,rgba(255,238,234,.6) 0%,transparent 36%)}
    body.day .wedding-cinema{background:#fdf1ee}

    .editorial-copy{position:absolute;z-index:3;top:22vh;left:6.3vw;width:min(39vw,700px)}
    .volume{display:flex;align-items:center;gap:13px;margin:0 0 2.4vh;color:var(--tx-soft);font-family:var(--font-serif);font-size:10px;font-style:italic;letter-spacing:.12em}
    .volume span{width:42px;height:1px;background:var(--line)}
    .editorial-copy h1{margin:0;font-family:var(--font-serif);font-size:clamp(62px,6.9vw,132px);font-weight:400;line-height:.78;letter-spacing:-.075em;text-shadow:0 5px 28px rgba(53,6,22,.18)}
    .editorial-copy h1 span{display:block;margin:0 0 .26em .08em;font-size:.42em;font-style:italic;letter-spacing:-.035em}
    .subtitle{margin:4.2vh 0 0;font-size:clamp(16px,1.23vw,24px);font-weight:720;line-height:1.55}
    .hero-acts{display:flex;align-items:center;gap:34px;margin-top:3.1vh}
    .meet-button{display:inline-flex;align-items:center;gap:35px;padding:13px 0;border-bottom:1px solid var(--line);font-size:10px;font-weight:900;letter-spacing:.16em;transition:gap 180ms ease,opacity 180ms ease}
    .meet-button:hover,.meet-button:focus-visible{gap:44px;opacity:.82}
    .letter-button{display:inline-flex;align-items:center;gap:9px;padding:13px 0;border:0;background:none;color:var(--tx);cursor:pointer;font-size:10px;font-weight:900;letter-spacing:.16em;opacity:.85;transition:opacity 160ms ease}
    .letter-button:hover{opacity:1}
    .letter-button b{color:var(--main);font-weight:400}
    body.day .letter-button b{color:var(--point)}

    .quote-card{position:absolute;z-index:4;right:5.5vw;bottom:13.5vh;width:min(21vw,380px);padding:22px 24px;border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .heart-mark{position:absolute;top:-26px;right:20px;display:grid;place-items:center;width:clamp(42px,3.1vw,62px);aspect-ratio:1;border:1px solid var(--line);border-radius:50%;background:rgba(198,45,66,.8);color:#fff;font-size:clamp(16px,1.2vw,24px);cursor:pointer;transition:transform 160ms ease}
    .heart-mark:hover{transform:scale(1.08)}
    .heart-mark.cn-bump{animation:hbump 480ms cubic-bezier(.2,.75,.25,1)}
    @keyframes hbump{30%{transform:scale(1.24)}60%{transform:scale(.94)}}
    .quote-card p{margin:0;font-family:var(--font-serif);font-size:clamp(14px,1.05vw,20px);font-weight:700;line-height:1.55}
    .quote-card > span:last-child{display:block;margin-top:15px;color:var(--tx-soft);font-size:9px;letter-spacing:.08em}
    .sideword{position:absolute;z-index:3;top:15vh;right:1.2vw;color:var(--tx-dim);font-size:8px;font-weight:800;letter-spacing:.25em;writing-mode:vertical-rl}
    .site-footer{position:absolute;z-index:4;right:3vw;bottom:3.5vh;left:3vw;display:flex;justify-content:space-between;align-items:center;color:var(--tx-dim);font-size:8px;letter-spacing:.14em}
    .site-footer b{color:var(--tx);font-size:8px}

    @media (max-width:1200px){.quote-card{right:3vw;width:24vw}}
    @media (max-width:900px){
      .editorial-copy{left:7vw;width:62vw}
      .quote-card{display:none}
    }
    @media (max-width:620px){
      .page-shell,.wedding-cinema{min-height:620px}
      .hero-background{object-position:57% center}
      .color-wash{background:linear-gradient(90deg,rgba(72,12,31,.92),rgba(72,12,31,.28))}
      body.day .color-wash{background:linear-gradient(90deg,rgba(255,241,238,.92),rgba(255,236,233,.3))}
      .editorial-copy{top:19vh;left:7vw;width:86vw}
      .editorial-copy h1{font-size:clamp(58px,17vw,96px)}
      .subtitle{margin-top:4vh}
      .hero-acts{flex-wrap:wrap;gap:18px}
      .site-footer span{display:none}
      .site-footer{justify-content:flex-start}
      .sideword{right:10px}
    }
  </style>
</head>
<body>
<script>if(localStorage.getItem('yeda-mode')==='day')document.body.classList.add('day');</script>

        <nav id="main-navigation" class="main-navigation" aria-label="메인 메뉴">
          <a href="profile/"><span>01</span>프로필</a>

  <!-- 연출 레이어 + 편지 모달 -->
  <div id="cnPetals" aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="js/cinema.js"></script>
  <script>
  /* ── 메인 DB 로더 (§2-B.2) ── */
  (function(){
    var MON=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    function setHook(k,v){
      var el=document.querySelector('[data-hook="'+k+'"]');
      if(el && v!=null && CN.txt(v).trim()!=='') el.innerHTML=CN.esc(v).replace(/\n/g,'<br>');
    }
    function applyBirthday(md){
      var p=String(md||'').split('-');
      if(p.length===2){
        var el=document.getElementById('hero-date');
        if(el) el.textContent=(MON[+p[0]-1]||'')+' '+(+p[1]);
        var n=CN.dday(md), strip=document.getElementById('dday-strip');
        if(strip && n!=null) strip.textContent = n===0 ? 'HAPPY BIRTHDAY ♥ TODAY' : 'BIRTHDAY D-'+n+' · SCROLL TO DISCOVER';
      }
    }
    async function load(){
      try{
        var res=await db.from('profile').select('data').eq('id',1);
        var d=res && res.data && res.data[0] && res.data[0].data;
        if(d){
          setHook('tagline', d.tagline);
          if(d['main-hero'] && CN.txt(d['main-hero']).trim()){
            var hb=document.getElementById('hero-bg'); if(hb) hb.src=CN.txt(d['main-hero']).trim();
          }
          setHook('quote', d.quote);
          applyBirthday(d.birthday||'08-18');
          var L=d.links||{};
          if(L.youtube){var yb=document.getElementById('link-youtube'); if(yb) yb.href=CN.txt(L.youtube);}
          if(L.soop){var lv=document.getElementById('live-link'); if(lv) lv.href=CN.txt(L.soop);}
        } else applyBirthday('08-18');
      }catch(e){ applyBirthday('08-18'); }
      finally{ CN.ready(); }
    }
    load();
    var hm=document.getElementById('heart-mark');
    if(hm) hm.addEventListener('click',function(e){
      CN.bump(hm);
      var r=hm.getBoundingClientRect();
      CN.pop(r.left+r.width/2, r.top+r.height/2, 4);
    });
  })();
  </script>
</body>
