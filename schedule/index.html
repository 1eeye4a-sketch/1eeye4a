  <style>
    /* ── 일정 전용 ── */
    .cal-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;margin:0 0 18px}
    .cal-nav{display:flex;align-items:center;gap:18px}
    .cal-nav button{
      width:38px;height:38px;border:1px solid var(--line);background:transparent;color:var(--tx);
      cursor:pointer;font-family:var(--font-serif);font-size:15px;transition:background 150ms ease;
    }
    .cal-nav button:hover{background:rgba(255,177,177,.12)}
    .cal-nav .ym{min-width:190px;text-align:center;font-family:var(--font-serif);font-weight:400;font-size:clamp(24px,2.6vw,34px);letter-spacing:-.02em}
    .cal-nav .ym i{font-style:italic;color:var(--main);font-size:.55em;margin-left:8px;letter-spacing:.08em}
    body.day .cal-nav .ym i{color:var(--point)}
    .cal-nav .today-btn{width:auto;padding:0 14px;font-family:var(--font-body);font-size:10px;font-weight:900;letter-spacing:.12em}
    .cal-search{display:flex;align-items:center;gap:10px;min-width:230px;padding:0 14px;border:1px solid var(--line);background:var(--glass)}
    .cal-search i{font-style:normal;color:var(--tx-dim);font-size:12px}
    .cal-search input{flex:1;padding:11px 0;border:0;background:none;color:var(--tx);font-family:var(--font-body);font-size:13px}
    .cal-search input::placeholder{color:var(--tx-dim)}
    .cal-search input:focus{outline:none}

    /* 달력 */
    .cal{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line)}
    .cal-head span{padding:11px 4px;text-align:center;color:var(--tx-soft);font-family:var(--font-serif);font-style:italic;font-size:12px;letter-spacing:.14em}
    .cal-head span:last-child{color:var(--main)}
    body.day .cal-head span:last-child{color:var(--point)}
    .cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-cell{
      position:relative;min-height:96px;padding:8px 8px 6px;
      border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    }
    .cal-cell:nth-child(7n){border-right:0}
    .cal-cell.out{opacity:.32}
    .cal-cell .dn{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--tx-soft)}
    .cal-cell.today{background:rgba(255,177,177,.09)}
    .cal-cell.today .dn{color:var(--main);font-weight:700}
    body.day .cal-cell.today .dn{color:var(--point)}
    .cal-cell.hitday{box-shadow:inset 0 0 0 1px var(--main)}
    .ev{
      position:relative;display:block;width:100%;margin-top:5px;padding:4px 7px;text-align:left;
      border:1px solid var(--line);background:rgba(255,255,255,.08);
      color:var(--tx);cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:650;line-height:1.4;
      transition:background 140ms ease;
    }
    body.day .ev{background:rgba(255,255,255,.55)}
    .ev .lb{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ev.tinted{border-left:3px solid var(--evc);background:var(--evbg)}
    body.day .ev.tinted{background:var(--evbg-day);border-left:3px solid var(--evc)}
    .ev.tinted:hover{filter:brightness(1.15)}
    .ev:hover{background:rgba(255,177,177,.16)}
    .ev b{color:var(--main);font-family:var(--font-serif);font-style:italic;font-weight:400;font-size:11px;margin-right:5px}
    body.day .ev b{color:var(--point)}
    .ev.dim{opacity:.35}
    /* 메모 호버 툴팁 */
    .ev[data-memo]:hover::after{
      content:attr(data-memo);
      position:absolute;z-index:20;left:0;bottom:calc(100% + 6px);
      width:max-content;max-width:230px;padding:9px 12px;
      border:1px solid var(--line);background:var(--glass-deep);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      color:var(--tx);font-size:11px;font-weight:500;line-height:1.6;white-space:pre-wrap;
      pointer-events:none;
    }
    .cal-cell .more{margin-top:4px;color:var(--tx-dim);font-size:9px;letter-spacing:.08em}

    /* 검색 결과 */
    .sr-list{display:grid;margin-top:22px}
    .sr-row{
      display:grid;grid-template-columns:110px 1fr auto;gap:14px;align-items:baseline;
      padding:12px 2px;border-bottom:1px solid var(--line-soft);cursor:pointer;
    }
    .sr-row:hover{background:rgba(255,177,177,.07)}
    .sr-row .dt{font-family:var(--font-serif);font-style:italic;font-size:12px;color:var(--tx-dim)}
    .sr-row .tt{font-size:13.5px;font-weight:700}
    .sr-row .tt small{display:block;margin-top:2px;color:var(--tx-dim);font-size:11px;font-weight:500}
    .sr-row .go{color:var(--main);font-size:9px;font-weight:900;letter-spacing:.14em}
    body.day .sr-row .go{color:var(--point)}

    /* 상세 모달 */
    #evModal{position:fixed;inset:0;z-index:85;display:none;place-items:center;padding:5vh 4vw;background:rgba(30,4,14,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    #evModal.on{display:grid}
    #evModal .box{position:relative;width:min(94vw,480px);max-height:88vh;overflow:auto;border:1px solid var(--line);background:var(--glass-deep);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);padding:30px}
    #evModal .x{position:absolute;top:16px;right:16px;border:0;background:none;color:var(--tx-dim);cursor:pointer;font-size:10px;font-weight:900;letter-spacing:.14em}
    #evModal .x:hover{color:var(--tx)}
    #evModal .ek{margin:0 0 4px;color:var(--main);font-family:var(--font-serif);font-style:italic;font-size:11px;letter-spacing:.14em}
    body.day #evModal .ek{color:var(--point)}
    #evModal h3{margin:0 0 16px;font-family:var(--font-serif);font-weight:400;font-size:24px;letter-spacing:-.02em;line-height:1.35}
    #ev-img{width:100%;margin:0 0 14px;border:1px solid var(--line-soft);display:none}
    #ev-memo{margin:0;color:var(--tx-soft);font-size:13.5px;line-height:1.8;white-space:pre-wrap}
    #ev-link{display:inline-flex;margin-top:16px}
    #ev-day-list{display:grid;margin-top:6px}

    @media (max-width:720px){
      .cal-cell{min-height:64px;padding:5px 4px 4px}
      .ev{padding:3px 4px}                 /* 모바일: 칩 → 점 */
      .ev .lb{display:none}
      .ev::before{content:"";display:block;width:6px;height:6px;margin:1px auto;border-radius:50%;background:var(--evc,var(--main))}
      body.day .ev::before{background:var(--evc,var(--point))}
      .ev[data-memo]:hover::after{display:none}
      .cal-cell .more{text-align:center}
      .cal-bar{flex-direction:column;align-items:stretch}
      .cal-nav{justify-content:space-between}
    }
  </style>
</head>

  <script>
  (function(){
    var esc=CN.esc, txt=CN.txt;
    var MON_EN=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    var events=[];           /* {id,date:'YYYY-MM-DD',time,title,memo,link,image_url} */
    var now=new Date(), curY=now.getFullYear(), curM=now.getMonth();
    var q='';

    function pad(n){ return (n<10?'0':'')+n; }
    function iso(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
    function todayIso(){ var n=new Date(); return iso(n.getFullYear(),n.getMonth(),n.getDate()); }
    function evOf(dateIso){
      return events.filter(function(e){ return String(e.date).slice(0,10)===dateIso; })
        .sort(function(a,b){ return String(a.time||'').localeCompare(String(b.time||'')); });
    }
    function match(e){
      if(!q) return true;
      return (txt(e.title)+' '+txt(e.memo)).toLowerCase().indexOf(q)>-1;
    }

    function render(){
      document.getElementById('cal-ym').textContent=curY+'. '+pad(curM+1);
      document.getElementById('cal-ym-en').textContent=MON_EN[curM];
      var first=new Date(curY,curM,1);
      var startOffset=(first.getDay()+6)%7;              /* 월요일 시작 */
      var start=new Date(curY,curM,1-startOffset);
      var tIso=todayIso(), h='';
      for(var i=0;i<42;i++){
        var d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
        var dIso=iso(d.getFullYear(),d.getMonth(),d.getDate());
        var out=d.getMonth()!==curM;
        var list=evOf(dIso);
        var anyHit=q && list.some(match);
        var chips='';
        list.slice(0,3).forEach(function(e){
          var dim=q&&!match(e);
          var c=txt(e.color).trim(), tint='';
          if(/^#[0-9a-fA-F]{6}$/.test(c)){
            var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),bl=parseInt(c.slice(5,7),16);
            tint=' style="--evc:'+c+';--evbg:rgba('+r+','+g+','+bl+',.18);--evbg-day:rgba('+r+','+g+','+bl+',.34)"';
          }
          chips+='<button class="ev'+(dim?' dim':'')+(tint?' tinted':'')+'" type="button" data-id="'+e.id+'"'+tint+
            (txt(e.memo).trim()?' data-memo="'+esc(e.memo)+'"':'')+'>'+
            '<span class="lb">'+(txt(e.time).trim()?'<b>'+esc(e.time)+'</b>':'')+esc(e.title)+'</span></button>';
        });
        if(list.length>3) chips+='<div class="more">+'+(list.length-3)+'개 더</div>';
        h+='<div class="cal-cell'+(out?' out':'')+(dIso===tIso?' today':'')+(anyHit?' hitday':'')+'" data-date="'+dIso+'">'+
           '<span class="dn">'+d.getDate()+'</span>'+chips+'</div>';
      }
      var body=document.getElementById('cal-body');
      body.innerHTML=h;
      body.querySelectorAll('.ev').forEach(function(b){
        b.addEventListener('click',function(ev){ ev.stopPropagation(); openEvent(b.dataset.id); });
      });
      body.querySelectorAll('.cal-cell').forEach(function(c){
        c.addEventListener('click',function(){
          if(window.innerWidth<=720 && evOf(c.dataset.date).length) openDay(c.dataset.date);
        });
      });
      renderSearch();
    }

    function renderSearch(){
      var el=document.getElementById('sr-list');
      if(!q){ el.innerHTML=''; return; }
      var hits=events.filter(match).sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
      if(!hits.length){ el.innerHTML='<div class="cn-empty">"'+esc(q)+'" 일정을 찾지 못했어요</div>'; return; }
      el.innerHTML='<p class="cn-kicker" style="margin:26px 0 6px">SEARCH · '+hits.length+'건</p>'+
        hits.slice(0,30).map(function(e){
          return '<div class="sr-row" data-id="'+e.id+'"><span class="dt">'+esc(String(e.date).slice(0,10).replace(/-/g,'.'))+
            (txt(e.time).trim()?' · '+esc(e.time):'')+'</span>'+
            '<span class="tt">'+esc(e.title)+(txt(e.memo).trim()?'<small>'+esc(String(e.memo).split('\n')[0]).slice(0,60)+'</small>':'')+'</span>'+
            '<span class="go">OPEN ↗</span></div>';
        }).join('');
      el.querySelectorAll('.sr-row').forEach(function(r){
        r.addEventListener('click',function(){
          var e=events.find(function(x){ return String(x.id)===r.dataset.id; });
          if(!e) return;
          var d=new Date(String(e.date).slice(0,10)+'T00:00:00');
          curY=d.getFullYear(); curM=d.getMonth(); render();
          openEvent(e.id);
        });
      });
    }

    var modal=document.getElementById('evModal');
    function fillDetail(e){
      var d=String(e.date).slice(0,10).replace(/-/g,'.');
      document.getElementById('ev-when').textContent=d+(txt(e.time).trim()?' · '+txt(e.time):'');
      document.getElementById('ev-title').textContent=txt(e.title);
      var im=document.getElementById('ev-img'), u=txt(e.image_url).trim();
      im.style.display=u?'block':'none'; if(u) im.src=u;
      document.getElementById('ev-memo').textContent=txt(e.memo);
      var lk=document.getElementById('ev-link'), lu=txt(e.link).trim();
      lk.style.display=lu?'inline-flex':'none'; if(lu) lk.href=lu;
    }
    function openEvent(id){
      var e=events.find(function(x){ return String(x.id)===String(id); });
      if(!e) return;
      fillDetail(e);
      document.getElementById('ev-day-list').innerHTML='';
      modal.classList.add('on');
    }
    function openDay(dIso){
      var list=evOf(dIso); if(!list.length) return;
      fillDetail(list[0]);
      var dl=document.getElementById('ev-day-list');
      dl.innerHTML=list.length>1
        ? '<p class="cn-kicker" style="margin:20px 0 4px">이 날의 다른 일정</p>'+list.slice(1).map(function(e){
            return '<div class="sr-row" data-id="'+e.id+'"><span class="dt">'+(txt(e.time).trim()?esc(e.time):'—')+'</span>'+
                   '<span class="tt">'+esc(e.title)+'</span><span class="go">OPEN</span></div>';
          }).join('')
        : '';
      dl.querySelectorAll('.sr-row').forEach(function(r){
        r.addEventListener('click',function(){ openEvent(r.dataset.id); });
      });
      modal.classList.add('on');
    }
    document.getElementById('evX').addEventListener('click',function(){ modal.classList.remove('on'); });
    modal.addEventListener('click',function(e){ if(e.target===modal) modal.classList.remove('on'); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') modal.classList.remove('on'); });

    document.getElementById('cal-prev').addEventListener('click',function(){ curM--; if(curM<0){curM=11;curY--;} render(); });
    document.getElementById('cal-next').addEventListener('click',function(){ curM++; if(curM>11){curM=0;curY++;} render(); });
    document.getElementById('cal-today').addEventListener('click',function(){ var n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); render(); });
    document.getElementById('cal-q').addEventListener('input',function(e){ q=(e.target.value||'').trim().toLowerCase(); render(); });

    async function load(){
      try{
        var r=await db.from('schedule_events').select('*');
        if(r&&Array.isArray(r.data)) events=r.data;
      }catch(e){}
      finally{ render(); CN.ready(); CN.reveal(); }
    }
    render();
    load();
  })();
  </script>
